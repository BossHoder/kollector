name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://127.0.0.1:27017/kollector-ci
          JWT_ACCESS_SECRET: ci-test-access-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
        run: npm test

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run web tests
        working-directory: web
        run: npm run test:run

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Install ai-worker dependencies
        working-directory: ai-worker
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ai-worker tests
        working-directory: ai-worker
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      RELEASE_ARCHIVE: .release-artifacts/kollector-release.tgz
    steps:
      - name: Check deploy secrets
        id: deploy_gate
        shell: bash
        run: |
          if [[ -n "${PROD_SSH_HOST}" && -n "${PROD_SSH_USER}" && -n "${PROD_SSH_KEY}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Production deploy secrets are missing. Skipping deploy job."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.deploy_gate.outputs.ready == 'true' }}

      - name: Create release archive
        if: ${{ steps.deploy_gate.outputs.ready == 'true' }}
        run: |
          mkdir -p "$(dirname "${RELEASE_ARCHIVE}")"
          rm -f "${RELEASE_ARCHIVE}"
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=venv \
            --exclude=.pytest_cache \
            --exclude=coverage \
            --exclude=dist \
            --exclude=.release-artifacts \
            --exclude=kollector-release.tgz \
            -czf "${RELEASE_ARCHIVE}" .

      - name: Upload release archive
        if: ${{ steps.deploy_gate.outputs.ready == 'true' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: ${{ env.RELEASE_ARCHIVE }}
          target: /tmp

      - name: Deploy on Oracle VM
        if: ${{ steps.deploy_gate.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ROOT: ${{ vars.PROD_APP_ROOT }}
          RELEASE_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: APP_ROOT,RELEASE_SHA
          script: |
            set -Eeuo pipefail
            trap 'rm -f /tmp/kollector-release.tgz' EXIT
            APP_ROOT="${APP_ROOT:-/opt/kollector}"
            RELEASE_DIR="${APP_ROOT}/releases/${RELEASE_SHA}"
            mkdir -p "${RELEASE_DIR}"
            tar -xzf /tmp/kollector-release.tgz -C "${RELEASE_DIR}"
            APP_ROOT="${APP_ROOT}" bash "${RELEASE_DIR}/deploy/oracle/scripts/deploy_release.sh" "${RELEASE_DIR}"

            CURRENT_TARGET="$(readlink -f "${APP_ROOT}/current")"
            if [[ "${CURRENT_TARGET}" != "${RELEASE_DIR}" ]]; then
              echo "Deploy did not activate the expected release."
              echo "Expected: ${RELEASE_DIR}"
              echo "Actual:   ${CURRENT_TARGET}"
              exit 1
            fi
