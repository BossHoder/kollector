name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Target platform to build
        required: true
        type: choice
        default: all
        options:
          - android
          - ios
          - all
      profile:
        description: EAS build profile
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production

concurrency:
  group: mobile-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mobile tests
        run: npm test -- --runInBand

      - name: Validate Expo config
        env:
          APP_VARIANT: ${{ github.event.inputs.profile == 'production' && 'production' || 'preview' }}
          EXPO_PUBLIC_API_URL: https://example.com/api
          EXPO_PUBLIC_SOCKET_URL: https://example.com
          EXPO_ANDROID_PACKAGE: com.example.kollector
          EXPO_IOS_BUNDLE_IDENTIFIER: com.example.kollector
        run: npm run config:public

  build:
    runs-on: ubuntu-latest
    needs: validate
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Check Expo token
        id: expo_gate
        shell: bash
        run: |
          if [[ -n "${EXPO_TOKEN}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN is missing. Skipping mobile build."
          fi

      - uses: actions/checkout@v4
        if: ${{ steps.expo_gate.outputs.ready == 'true' }}

      - uses: actions/setup-node@v4
        if: ${{ steps.expo_gate.outputs.ready == 'true' }}
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo and EAS
        if: ${{ steps.expo_gate.outputs.ready == 'true' }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        if: ${{ steps.expo_gate.outputs.ready == 'true' }}
        run: npm ci

      - name: Trigger EAS build
        if: ${{ steps.expo_gate.outputs.ready == 'true' }}
        run: eas build --platform "${{ github.event.inputs.platform }}" --profile "${{ github.event.inputs.profile }}" --non-interactive --no-wait
