services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "3000"
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN}
      MONGODB_URI: ${MONGODB_URI}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-worker:8000
      STORAGE_DRIVER: ${STORAGE_DRIVER}
      STORAGE_ROOT: ${STORAGE_ROOT}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    volumes:
      - shared_uploads:${STORAGE_ROOT}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ai-worker:
    build:
      context: ./ai-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8000"
      ENVIRONMENT: production
      STORAGE_DRIVER: ${STORAGE_DRIVER}
      STORAGE_ROOT: ${STORAGE_ROOT}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL}
      STORAGE_INTERNAL_BASE_URL: http://nginx
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      REDIS_URL: redis://redis:6379
      HF_HOME: ${HF_HOME}
      U2NET_HOME: ${U2NET_HOME}
      MODEL_REMOVE_BG: ${MODEL_REMOVE_BG}
      MODEL_REMOVE_BG_REVISION: ${MODEL_REMOVE_BG_REVISION:-}
      MODEL_VISION: ${MODEL_VISION}
      MODEL_VISION_REVISION: ${MODEL_VISION_REVISION:-}
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - shared_uploads:${STORAGE_ROOT}
      - hf_cache:${HF_HOME}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
      ai-worker:
        condition: service_healthy
    ports:
      - "127.0.0.1:${EDGE_HTTP_PORT}:80"
    volumes:
      - ./deploy/oracle/nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - shared_uploads:/var/www/uploads:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  shared_uploads:
  redis_data:
  hf_cache:
